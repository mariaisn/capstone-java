<html class="percent">
  <head>
    <title>Structural | Do While Loop</title>
    <link rel="stylesheet" href="css/doWhileLoop.css" />
  </head>

  <body class="container percent">
    <header class="a1 cent">
      <a href="index.html">
        <img src="images/GoldLogo.png" alt="Gold Logo" class="logo-gold" />
      </a>
      <div class="example-title-box">Do While Loop</div>
      <div class="theme-toggle-wrapper">
        <input type="checkbox" id="toggle" class="toggle-checkbox" />
        <label for="toggle" class="toggle-label"></label>
      </div>
    </header>

    <div class="b1 code">
      <div class="sectiontitle cent ca">Code</div>

      <div class="cb bar">
        <pre id="high">
public class Test {
	
	public static void main(String args[]) {

		<span>int x</span> <span id="val-x">=0</span>;
		<span>do </span>{
			<span id="val-print">System.out.println("Hello")</span>;
			<span id="val-1">x++</span>;
        }<span id="val-c">while(x < 3)</span>;<span> </span>
	}
}
            </pre>
      </div>

      <div class="buttons cent">
        <button class="btn back-btn" id="back">&larr; Back</button>
        <button class ="btn next-btn" id="next">Next &rarr;</button>
      </div>
    </div>

    <div class="b2 viz">
      <div class="sectiontitle cent ca">Memory</div>

      <div class="cb memory-content">
        <div class="memory-explanation" id="memory-explanation">
          Click Next to begin
        </div>
        <div class="mVariable cent" id="mem-vars">
          <div class="mem-item">
            <div class="mem-label">x</div>
            <div class="mem-square cent" id="mem-x"></div>
          </div>
        </div>

        <div class="mVariable">
          <div class="mem-item memOut" id="mem-num-x"></div>
          <div class="mem-item memOut" id="mem-num-x1"></div>

          <div class="memOut cent" id="plus-op">+</div>
          <div class="memOut cent" id="less-op"><</div>

          <div class="mem-item memOut" id="mem-num-1"></div>
          <div class="mem-item memOut" id="mem-num-c"></div>

          <div class="memOut cent" id="equal-op">=</div>

          <div class="mem-item memOut" id="val-sum"></div>
          <div class="mem-item memOut" id="val-bool"></div>
        </div>
      </div>
    </div>

    <div class="c1 out">
      <div class="ca sectiontitle cent">Output</div>

      <div class="console-wrapper bar">
        <div id="console"></div>
      </div>
    </div>

    <script src="js/doWhileLoop.js"></script>
  </body>
</html>
