<!doctype html>
<html class="percent">
  <head>
    <title>Structural | Int Array Example</title>
    <link rel="stylesheet" href="css/IntArray.css" />
  </head>

  <body class="container percent">
    <header class="a1 cent">
      <a href="index.html">
        <img src="images/GoldLogo.png" alt="Gold Logo" class="logo-gold" />
      </a>
      <div class="example-title-box">Integer Array Example</div>
    </header>

    <div class="b1 div1 code">
      <div class="sectiontitle cent ca">Code</div>

      <div class="cb bar">
        <pre id="high">
public class Test {

  public static void main(String[] args) {
    <span>int[] values </span><span id="val-array">= new int[5];</span>

    <span>values[3] </span><span id="val-assign">= 7;</span>

    <span>System.out.println(</span><span id="val-print">values[3]</span><span>);</span>
  }
}
        </pre>
      </div>

      <div class="cc cent">
        <button id="back">Back</button>
        <button id="next">Next</button>
      </div>
    </div>

    <div class="b2 viz">
      <div class="sectiontitle cent ca">Memory</div>

      <div class="cb memory-content">
        <div class="memory-explanation" id="memory-explanation"></div>

        <div class="memory-layout">
          <div class="array-panel panel-main" id="panel-array">
            <div class="ref-group">
              <div class="mem-item" id="item-array">
                <div class="mem-label">values</div>
                <div class="mem-square cent" id="mem-array"></div>
              </div>
            </div>

            <div class="array-block" id="array-block">
              <div class="array-title">int[5]</div>
              <div class="array-row">
                <div class="array-cell-wrap">
                  <div class="array-index">0</div>
                  <div class="array-cell cent" id="cell-0">0</div>
                </div>
                <div class="array-cell-wrap">
                  <div class="array-index">1</div>
                  <div class="array-cell cent" id="cell-1">0</div>
                </div>
                <div class="array-cell-wrap">
                  <div class="array-index">2</div>
                  <div class="array-cell cent" id="cell-2">0</div>
                </div>
                <div class="array-cell-wrap">
                  <div class="array-index">3</div>
                  <div class="array-cell cent target-cell" id="cell-3">0</div>
                </div>
                <div class="array-cell-wrap">
                  <div class="array-index">4</div>
                  <div class="array-cell cent" id="cell-4">0</div>
                </div>
              </div>
            </div>

            <div class="calc-row" id="calc-row">
              <div class="calc-label cent" id="calc-left"></div>
              <div class="calc-op cent" id="calc-eq">=</div>
              <div class="calc-box cent" id="calc-right"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="c1 out">
      <div class="ca sectiontitle cent">Output</div>

      <div class="cb bar out-box">
        <div id="ou1"></div>
      </div>
    </div>

    <script src="js/IntArray.js"></script>
  </body>
</html>
